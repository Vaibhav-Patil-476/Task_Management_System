# ---------------------- DATABASE CONFIGURATION ----------------------

# JDBC URL to connect to the MySQL database "opd_management_system"
spring.datasource.url=jdbc:mysql://localhost:3306/Task_Management_System

# MySQL database credentials
spring.datasource.username=root
spring.datasource.password=root123

# ---------------------- JPA / HIBERNATE CONFIGURATION ----------------------

# Automatically update the database schema based on entity classes
spring.jpa.hibernate.ddl-auto=update

# MySQL dialect tells Hibernate how to generate SQL for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Show SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true

